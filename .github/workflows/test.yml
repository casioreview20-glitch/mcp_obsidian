name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --extra dev --locked
      - name: Run tests
        run: uv run --extra dev pytest
      - name: Compile source and tests
        run: uv run python -m compileall -q src tests
      - name: Build wheel and source distribution
        run: uv build
      - name: Smoke test the built wheel
        run: |
          uv venv --python ${{ matrix.python-version }} .wheel-smoke
          uv pip install --python .wheel-smoke/Scripts/python.exe dist/*.whl
          .wheel-smoke/Scripts/ai-brain.exe --help
